# .github/workflows/validate-pr.yml
#
# Runs on every PR that touches repositories.toml.
# Can also be triggered manually by commenting "/validate" on a PR.
# Ensures:
#   1. The TOML is valid and well-structured
#   2. Only one plugin is added or modified per PR
#   3. Commits are full 40-char SHAs
#   4. No unexpected fields or structural issues

name: Validate Plugin PR

on:
  pull_request:
    paths:
      - "repositories.toml"
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Run on PR events, or on "/validate" comments on PRs
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/validate') &&
       contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association))

    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            pr_number="${{ github.event.issue.number }}"
            echo "number=$pr_number" >> "$GITHUB_OUTPUT"
            # Fetch PR refs via the GitHub API
            pr_data=$(gh api repos/${{ github.repository }}/pulls/$pr_number)
            head_sha=$(echo "$pr_data" | jq -r '.head.sha')
            base_sha=$(echo "$pr_data" | jq -r '.base.sha')
            echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
            echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          path: head
          persist-credentials: false

      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.pr.outputs.base_sha }}
          path: base
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Prepare trusted helper scripts
        run: |
          mkdir trusted
          cp base/scripts/parse_plugins.py base/scripts/plugin_validation.py base/scripts/generate_index.py trusted/
          cp head/repositories.toml trusted/repositories.toml

      # ── Step 1: Diff to find what changed ──
      - name: Detect plugin changes
        id: diff
        run: |
          diff_result=$(python3 trusted/parse_plugins.py diff base/repositories.toml head/repositories.toml)
          echo "$diff_result" | python3 -c "
          import json, sys, os
          d = json.load(sys.stdin)
          added = len(d['added'])
          modified = len(d['modified'])
          removed = len(d['removed'])
          total = d['total_changes']
          changed = [p['name'] for p in d['added'] + d['modified']]

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as summary:
              summary.write('### Plugin Changes\n')
              summary.write(f'Added: {added}\n')
              summary.write(f'Modified: {modified}\n')
              summary.write(f'Removed: {removed}\n')
              summary.write(f'Total changes: {total}\n')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'total={total}\n')
              out.write(f'added={added}\n')
              out.write(f'modified={modified}\n')
              out.write(f'removed={removed}\n')
              out.write(f'changed_json={json.dumps(changed, separators=(\",\", \":\"))}\n')
          "
          echo "diff_json=$(echo "$diff_result" | jq -c .)" >> "$GITHUB_OUTPUT"

      # ── Step 2: Validate changed plugin metadata ──
      - name: Install dependencies
        run: python3 -m pip install --disable-pip-version-check "PyGitHub==2.1.1"

      - name: Validate plugin metadata
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_JSON: ${{ steps.diff.outputs.changed_json }}
        run: |
          echo "### Plugin Validation" >> "$GITHUB_STEP_SUMMARY"
          if [ "$CHANGED_JSON" = "[]" ]; then
            echo "✅ No added/modified plugins to validate." >> "$GITHUB_STEP_SUMMARY"
            echo "toml_valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_plugins=()
          while IFS= read -r plugin_name; do
            changed_plugins+=("$plugin_name")
          done < <(
            python3 - <<'PY'
          import json
          import os

          for name in json.loads(os.environ["CHANGED_JSON"]):
              print(name)
          PY
          )

          if python3 trusted/generate_index.py -t "$GH_TOKEN" --strict -p "${changed_plugins[@]}"; then
            echo "✅ All changed plugins validated successfully." >> "$GITHUB_STEP_SUMMARY"
            echo "toml_valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ **Plugin validation failed.**" >> "$GITHUB_STEP_SUMMARY"
            echo "toml_valid=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Step 3: Enforce single-plugin-per-PR rule ──
      - name: Check single plugin rule
        id: single-check
        run: |
          total=${{ steps.diff.outputs.total }}

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Single Plugin Rule" >> "$GITHUB_STEP_SUMMARY"

          if [ "$total" -eq 0 ]; then
            echo "⚠️ No plugin changes detected in repositories.toml." >> "$GITHUB_STEP_SUMMARY"
            echo "pass=true" >> "$GITHUB_OUTPUT"
          elif [ "$total" -eq 1 ]; then
            echo "✅ Exactly one plugin changed — rule satisfied." >> "$GITHUB_STEP_SUMMARY"
            echo "pass=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ **$total plugins changed.** Please submit one plugin change per PR." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This makes security review manageable and keeps the git history clean." >> "$GITHUB_STEP_SUMMARY"
            echo "pass=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Step 4: Post a summary comment on the PR ──
      - name: Post PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          toml_ok="${{ steps.validate.outputs.toml_valid }}"
          single_ok="${{ steps.single-check.outputs.pass }}"
          total="${{ steps.diff.outputs.total }}"

          if [ "$toml_ok" = "true" ] && [ "$single_ok" = "true" ]; then
            status="✅ All validation checks passed"
          else
            status="❌ Some validation checks failed"
          fi

          {
            echo "<!-- validate-pr-report -->"
            echo ""
            echo "## Plugin PR Validation"
            echo ""
            echo "${status}"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| TOML structure | $([ "$toml_ok" = "true" ] && echo "✅ Valid" || echo "❌ Invalid") |"
            echo "| Single plugin rule | $([ "$single_ok" = "true" ] && echo "✅ Pass ($total change)" || echo "❌ Fail ($total changes)") |"
            echo ""
            echo "See the [workflow summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          } > comment.md

          comment_id=$(gh api repos/${{ github.repository }}/issues/${{ steps.pr.outputs.number }}/comments \
            --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]" and (.body | contains("<!-- validate-pr-report -->"))) | .id' \
            | tail -n 1)

          if [ -n "$comment_id" ]; then
            body=$(cat comment.md)
            gh api --method PATCH repos/${{ github.repository }}/issues/comments/"$comment_id" \
              --raw-field body="$body" >/dev/null
          else
            gh pr comment ${{ steps.pr.outputs.number }} --body-file comment.md
          fi

      # ── Final: fail the job if any check failed ──
      - name: Fail on validation errors
        if: steps.validate.outputs.toml_valid == 'false' || steps.single-check.outputs.pass == 'false'
        run: |
          echo "::error::Validation failed. See job summary for details."
          exit 1
